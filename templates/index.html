<!DOCTYPE html>
<html>
<head>
<title>AI Fake Review Detection</title>
</head>

<body>

<h2>AI Fake Product Review Detection</h2>

<form method="POST">

<textarea name="review" placeholder="Enter review"></textarea>

<br><br>

<label>Rating:</label>

<select name="rating">
<option value="1">1 Star</option>
<option value="2">2 Star</option>
<option value="3">3 Star</option>
<option value="4">4 Star</option>
<option value="5">5 Star</option>
</select>

<br><br>

<button type="submit">Check Review</button>

</form>

{% if prediction %}

<h3>Prediction: {{prediction}}</h3>

<h3>Sentiment: {{sentiment}}</h3>

{% endif %}

</body>
</html>
