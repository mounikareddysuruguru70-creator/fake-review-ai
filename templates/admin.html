<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

table{
margin:auto;
border-collapse: collapse;
width:80%;
background:white;
}

th,td{
padding:10px;
border:1px solid #ccc;
}

th{
background:#333;
color:white;
}

tr:nth-child(even){
background:#f2f2f2;
}

button{
padding:10px 20px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Admin Panel - All Reviews</h1>

<table>

<tr>
<th>ID</th>
<th>Review</th>
<th>Prediction</th>
<th>Sentiment</th>
<th>Rating</th>
</tr>

{% for r in reviews %}

<tr>

<td>{{r[0]}}</td>
<td>{{r[1]}}</td>
<td>{{r[2]}}</td>
<td>{{r[3]}}</td>
<td>{{r[4]}}</td>

</tr>

{% endfor %}

</table>

<br><br>

<a href="/">

<button>Back to Home</button>

</a>

</body>

</html>
